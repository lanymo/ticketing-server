spring:
  application:
    name: ticketing-server

  # ── MySQL 설정 ──────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3307/ticketing?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ticketing
    password: ticketing1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA 설정 ────────────────────────────────────────────
  jpa:
    hibernate:
      # create-drop : 앱 시작 시 테이블 생성, 종료 시 삭제 (개발 초기에 편함)
      # update      : 엔티티 변경 시 테이블에 반영 (컬럼 추가 등)
      # validate    : 엔티티와 테이블 일치 여부만 검사 (운영 환경 권장)
      # none        : 아무것도 안 함
      ddl-auto: create-drop   # Phase 1 개발 중에는 create-drop 사용
    properties:
      hibernate:
        format_sql: true      # 콘솔에 출력되는 SQL을 보기 좋게 포맷
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true            # 실행되는 SQL을 콘솔에 출력 (개발 시 유용)

  # ── Redis 설정 ──────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      # password:           # Redis에 비밀번호 설정 시 여기에 추가

# ── JWT 설정 ─────────────────────────────────────────────
# secret: Base64로 인코딩된 256bit(32바이트) 이상의 랜덤 키
# 운영 환경에서는 환경변수로 주입할 것 (JWT_SECRET)
jwt:
  secret: ${JWT_SECRET:dGlja2V0aW5nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1NmJpdHM=}

# ── 로깅 설정 ────────────────────────────────────────────
logging:
  level:
    ticket.system.ticketing_server: DEBUG   # 우리 코드는 DEBUG 레벨로 상세 출력
    org.hibernate.SQL: DEBUG                # 실행 SQL 출력
    org.hibernate.orm.jdbc.bind: TRACE      # SQL 바인딩 파라미터 출력 (? 값 확인)